<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="app">


<div class="card">


<header>

<h1>🚀 TaskFlow</h1>

<p>Organize your work. Track your progress.</p>

</header>



<div class="stats">

<div>
<h2 id="count">0</h2>
<p>Total Tasks</p>
</div>

</div>



<div class="input-box">

<input id="taskInput" placeholder="Add a new task...">

<button onclick="addTask()">
+ Add
</button>

</div>



<ul id="taskList"></ul>


</div>


</div>


<script src="script.js"></script>

</body>

</html>
